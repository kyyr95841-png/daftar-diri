<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Keren - Data Diri</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f0c29;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND PARTICLES ===== */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: floatUp linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; width: 8px; height: 8px; }
        .particle:nth-child(2) { left: 20%; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 30%; animation-duration: 10s; animation-delay: 4s; width: 10px; height: 10px; }
        .particle:nth-child(4) { left: 40%; animation-duration: 18s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 50%; animation-duration: 13s; animation-delay: 3s; width: 7px; height: 7px; }
        .particle:nth-child(6) { left: 60%; animation-duration: 16s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 70%; animation-duration: 11s; animation-delay: 2s; width: 9px; height: 9px; }
        .particle:nth-child(8) { left: 80%; animation-duration: 14s; animation-delay: 0s; }
        .particle:nth-child(9) { left: 90%; animation-duration: 17s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(10) { left: 15%; animation-duration: 19s; animation-delay: 6s; }
        .particle:nth-child(11) { left: 45%; animation-duration: 12s; animation-delay: 1s; width: 8px; height: 8px; }
        .particle:nth-child(12) { left: 75%; animation-duration: 14s; animation-delay: 4s; }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== GLASS CARD CONTAINER ===== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 950px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 45px 40px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ===== GLOW ORB DECORATION ===== */
        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
        }

        .glow-orb.orb1 {
            width: 300px;
            height: 300px;
            background: rgba(99, 102, 241, 0.3);
            top: -100px;
            right: -50px;
            animation: pulseOrb 8s ease-in-out infinite;
        }

        .glow-orb.orb2 {
            width: 250px;
            height: 250px;
            background: rgba(236, 72, 153, 0.2);
            bottom: -80px;
            left: -60px;
            animation: pulseOrb 10s ease-in-out infinite reverse;
        }

        @keyframes pulseOrb {
            0%, 100% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* ===== PROFILE HEADER ===== */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .profile-avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }

        .profile-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            color: white;
            font-weight: 700;
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            user-select: none;
        }

        .profile-avatar:hover {
            transform: scale(1.08) rotate(-5deg);
        }

        .profile-avatar .status-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #a855f7;
            border-right-color: #ec4899;
            animation: spinRing 3s linear infinite;
        }

        @keyframes spinRing {
            to { transform: rotate(360deg); }
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 22px;
            height: 22px;
            background: #22c55e;
            border-radius: 50%;
            border: 3px solid #1a1a2e;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
            animation: pulseDot 2s ease-in-out infinite;
        }

        @keyframes pulseDot {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(34, 197, 94, 0.6); }
            50% { transform: scale(1.2); box-shadow: 0 0 40px rgba(34, 197, 94, 0.9); }
        }

        .profile-title h1 {
            font-size: 34px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .profile-title h1 .highlight {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .profile-title .subtitle {
            color: rgba(255, 255, 255, 0.7);
            font-size: 17px;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .profile-title .subtitle .badge {
            background: rgba(99, 102, 241, 0.3);
            padding: 3px 14px;
            border-radius: 20px;
            font-size: 12px;
            color: #a5b4fc;
            border: 1px solid rgba(99, 102, 241, 0.2);
            backdrop-filter: blur(10px);
        }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .stat-item:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .stat-item .stat-number {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-item .stat-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        /* ===== INFO GRID ===== */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 30px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .info-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(5px);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .info-card.full-width {
            grid-column: 1 / -1;
        }

        .info-card .icon-box {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .info-card .icon-box.purple { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
        .info-card .icon-box.pink { background: rgba(236, 72, 153, 0.2); color: #f472b6; }
        .info-card .icon-box.green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .info-card .icon-box.orange { background: rgba(251, 146, 60, 0.2); color: #fb923c; }
        .info-card .icon-box.cyan { background: rgba(6, 182, 212, 0.2); color: #22d3ee; }
        .info-card .icon-box.blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }

        .info-card .info-text .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.35);
            font-weight: 600;
        }

        .info-card .info-text .value {
            font-size: 16px;
            color: #ffffff;
            font-weight: 500;
            margin-top: 1px;
        }

        /* ===== SECTION TITLE ===== */
        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #ffffff;
            font-size: 19px;
            font-weight: 600;
            margin: 28px 0 16px 0;
            letter-spacing: -0.3px;
        }

        .section-title .line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }

        .section-title i {
            color: #a855f7;
        }

        /* ===== BIO ===== */
        .bio-content {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 24px;
            border-left: 3px solid #a855f7;
            color: rgba(255, 255, 255, 0.85);
            line-height: 1.8;
            font-size: 15px;
            backdrop-filter: blur(5px);
        }

        /* ===== SKILLS ===== */
        .skills-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 6px;
        }

        .skill-tag {
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            cursor: default;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .skill-tag:hover {
            transform: translateY(-3px) scale(1.04);
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.2);
        }

        .skill-tag i {
            font-size: 14px;
            opacity: 0.7;
        }

        .skill-tag.level-expert { border-color: rgba(34, 197, 94, 0.3); }
        .skill-tag.level-adv { border-color: rgba(99, 102, 241, 0.3); }
        .skill-tag.level-inter { border-color: rgba(251, 146, 60, 0.3); }

        /* ===== SOCIAL ===== */
        .social-grid {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 11px 24px;
            border-radius: 30px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
            backdrop-filter: blur(5px);
        }

        .social-btn:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .social-btn i {
            font-size: 18px;
        }

        .social-btn.github:hover { background: rgba(255, 255, 255, 0.12); border-color: #6e5494; }
        .social-btn.linkedin:hover { background: rgba(10, 102, 194, 0.25); border-color: #0a66c2; }
        .social-btn.instagram:hover { background: rgba(225, 48, 108, 0.25); border-color: #e1306c; }
        .social-btn.twitter:hover { background: rgba(29, 161, 242, 0.25); border-color: #1da1f2; }
        .social-btn.youtube:hover { background: rgba(255, 0, 0, 0.2); border-color: #ff0000; }
        .social-btn.email:hover { background: rgba(234, 67, 53, 0.2); border-color: #ea4335; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .container { padding: 30px 20px; }
            .profile-header { flex-direction: column; text-align: center; gap: 18px; }
            .profile-title h1 { font-size: 28px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .info-grid { grid-template-columns: 1fr; }
            .social-grid { justify-content: center; }
            .skills-wrapper { justify-content: center; }
            .profile-avatar { width: 100px; height: 100px; font-size: 40px; }
            .glow-orb.orb1 { width: 150px; height: 150px; }
            .glow-orb.orb2 { width: 120px; height: 120px; }
        }

        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; }
            .stat-item { padding: 12px; }
            .stat-item .stat-number { font-size: 20px; }
            .info-card { padding: 12px 16px; }
            .info-card .info-text .value { font-size: 14px; }
            .container { padding: 20px 14px; border-radius: 20px; }
            .social-btn { padding: 9px 16px; font-size: 13px; }
            .social-btn i { font-size: 15px; }
        }
    </style>
</head>
